services:
  db:
    image: postgres:16
    container_name: access_mobility_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: access_user
      POSTGRES_PASSWORD: access_pass
      POSTGRES_DB: access_mobility
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
